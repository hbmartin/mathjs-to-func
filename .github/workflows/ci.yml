name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  testing:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Install benchmark JavaScript dependencies
        run: npm ci --prefix bench/js

      - name: Check code formatting with ruff
        run: uv run ruff check

      - name: Type check with ty
        run: uv run ty check src

      - name: Check code formatting with black
        run: uv run black --check --diff src

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=mathjs_to_func \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=markdown-append:${GITHUB_STEP_SUMMARY}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error

      - name: Export JSON Schema artifact
        run: uv run python -m mathjs_to_func schema --output dist/mathjs-to-func.schema.json

      - name: Upload JSON Schema artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mathjs-to-func-json-schema
          path: dist/mathjs-to-func.schema.json

      - name: Run benchmark perf gate
        run: uv run python -m bench --check --json dist/benchmark-results.json

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mathjs-to-func-benchmark-results
          path: dist/benchmark-results.json
